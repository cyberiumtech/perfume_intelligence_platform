version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: perfume_intelligence_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perfume_intelligence_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/perfume_intelligence_db
      OLLAMA_HOST: http://ollama:11434
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  scraper:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/perfume_intelligence_db
      OLLAMA_HOST: http://ollama:11434
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app.scraper_worker

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pg_data:
  ollama_data:
